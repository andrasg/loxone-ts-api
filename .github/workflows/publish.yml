name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish (for example: v1.3.3)
        required: true
      prerelease:
        description: Publish with prerelease dist-tag logic
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.release_tag) || format('refs/tags/{0}', github.event.release.tag_name) }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
            
      - name: Resolve release metadata
        id: get_version
        run: |
          # Resolve tag from release event or manual dispatch input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.release_tag }}"
            IS_PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG_NAME="${{ github.event.release.tag_name }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
          fi

          VERSION="$TAG_NAME"
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG_NAME"
          echo "Resolved version: $VERSION"
          echo "Prerelease: $IS_PRERELEASE"

      - name: Update package.json version
        run: |
          # Update the version in package.json
          npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version --allow-same-version
          echo "Updated package.json to version ${{ steps.get_version.outputs.version }}"

      - name: Install dependencies
        run: npm ci
    
      - name: Build the project
        run: npm run build

      - name: Determine npm dist-tag
        id: determine_dist_tag
        run: |
          # Determine dist tag for npm publish.
          # If the GitHub release is marked as prerelease, try to use the pre-release identifier
          # (e.g. v1.2.3-alpha.1 => tag "alpha"). Otherwise use "latest".
          # As a fallback for prerelease without a suffix use "next".
          VERSION="${{ steps.get_version.outputs.version }}"

          if [ "${{ steps.get_version.outputs.is_prerelease }}" = "true" ]; then
            if [[ "$VERSION" == *"-"* ]]; then
              PR=${VERSION#*-}
              LABEL=${PR%%.*}
              echo "dist_tag=$LABEL" >> $GITHUB_OUTPUT
            else
              echo "dist_tag=next" >> $GITHUB_OUTPUT
            fi
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        run: npm publish --provenance --tag ${{ steps.determine_dist_tag.outputs.dist_tag }}
